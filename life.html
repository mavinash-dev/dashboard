<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life — mavinash-dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b; color: #e4e4e7;
      min-height: 100vh; padding: 28px 20px 48px;
    }

    /* Header */
    .header {
      max-width: 1120px; margin: 0 auto 8px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px; flex-wrap: wrap;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .header-title h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .header-title p { font-size: 11px; color: #52525b; margin-top: 1px; }
    .analyse-btn {
      padding: 7px 14px; background: #18181b; border: 1px solid #27272a;
      border-radius: 8px; color: #a1a1aa; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: all 0.15s; white-space: nowrap;
    }
    .analyse-btn:hover { border-color: #6366f1; color: #6366f1; }
    .analyse-btn.loading { opacity: 0.6; cursor: not-allowed; }
    .analyse-toast {
      max-width: 1120px; margin: 0 auto 16px;
      padding: 10px 14px; border-radius: 8px; font-size: 12px;
      display: none;
    }
    .analyse-toast.show { display: block; }
    .analyse-toast.running { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); color: #818cf8; }
    .analyse-toast.done    { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.2);  color: #22c55e; }
    .analyse-toast.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2);  color: #ef4444; }

    /* Tab Nav */
    .tabs {
      max-width: 1120px; margin: 0 auto 28px;
      display: flex; gap: 4px; border-bottom: 1px solid #1d1d20;
      padding-bottom: 0;
    }
    .tab {
      padding: 8px 16px; font-size: 13px; font-weight: 500;
      color: #52525b; text-decoration: none; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: #a1a1aa; }
    .tab.active { color: #fff; border-bottom-color: #6366f1; }

    /* Stats strip */
    .stats-strip {
      max-width: 1120px; margin: 0 auto 24px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 160px), 1fr));
      gap: 10px;
    }
    .stat-card {
      background: #111113; border: 1px solid #1d1d20; border-radius: 10px;
      padding: 14px 16px;
    }
    .stat-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: #3f3f46; font-weight: 600; margin-bottom: 6px; }
    .stat-card .value { font-size: 22px; font-weight: 700; color: #fff; line-height: 1; }
    .stat-card .sub { font-size: 11px; color: #52525b; margin-top: 4px; }

    /* Section */
    .section { max-width: 1120px; margin: 0 auto 28px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: #3f3f46; font-weight: 600; margin-bottom: 12px; }

    /* Streak cards */
    .streaks { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 200px), 1fr)); gap: 10px; }
    .streak-card {
      background: #111113; border: 1px solid #1d1d20; border-radius: 10px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    }
    .streak-icon { font-size: 20px; flex-shrink: 0; }
    .streak-info { flex: 1; min-width: 0; }
    .streak-name { font-size: 12px; color: #a1a1aa; }
    .streak-val { font-size: 18px; font-weight: 700; color: #fff; }
    .streak-sub { font-size: 10px; color: #52525b; margin-top: 1px; }
    .streak-fire { color: #f59e0b; font-size: 13px; }

    /* Heatmap */
    .heatmap { display: flex; flex-direction: column; gap: 4px; }
    .heatmap-months { display: flex; gap: 4px; padding-left: 28px; margin-bottom: 4px; }
    .heatmap-month { font-size: 10px; color: #3f3f46; }
    .heatmap-row { display: flex; gap: 3px; align-items: center; }
    .heatmap-day-label { font-size: 9px; color: #3f3f46; width: 24px; flex-shrink: 0; text-align: right; padding-right: 4px; }
    .heatmap-cells { display: flex; gap: 3px; flex-wrap: wrap; }
    .heatmap-cell {
      width: 13px; height: 13px; border-radius: 2px;
      background: #1d1d20; flex-shrink: 0;
    }
    .heatmap-cell.great { background: #16a34a; }
    .heatmap-cell.good  { background: #22c55e; opacity: 0.7; }
    .heatmap-cell.short { background: #f59e0b; opacity: 0.8; }
    .heatmap-cell.none  { background: #ef4444; opacity: 0.7; }
    .heatmap-legend { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .heatmap-legend span { font-size: 10px; color: #3f3f46; }
    .legend-cell { width: 10px; height: 10px; border-radius: 2px; }

    /* Sleep bars */
    .sleep-bars { display: flex; flex-direction: column; gap: 6px; }
    .sleep-bar-row { display: flex; align-items: center; gap: 8px; }
    .sleep-bar-label { font-size: 11px; color: #52525b; width: 36px; flex-shrink: 0; }
    .sleep-bar-track { flex: 1; height: 8px; background: #1d1d20; border-radius: 4px; overflow: hidden; }
    .sleep-bar-fill { height: 100%; border-radius: 4px; background: #6366f1; transition: width 0.4s ease; }
    .sleep-bar-val { font-size: 11px; color: #71717a; width: 32px; text-align: right; flex-shrink: 0; }

    /* Insights */
    .insights { display: flex; flex-direction: column; gap: 8px; }
    .insight {
      background: #111113; border: 1px solid #1d1d20; border-radius: 8px;
      padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start;
    }
    .insight-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .insight-text { font-size: 12px; color: #a1a1aa; line-height: 1.5; }
    .insight-text strong { color: #e4e4e7; }

    /* Energy row */
    .energy-row { display: flex; gap: 6px; align-items: center; }
    .energy-dot { width: 8px; height: 8px; border-radius: 50%; background: #27272a; flex-shrink: 0; }
    .energy-dot.filled { background: #f59e0b; }

    /* Log table */
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #3f3f46; text-align: left; padding: 0 12px 8px 0; }
    .log-table td { font-size: 12px; color: #71717a; padding: 8px 12px 8px 0; border-top: 1px solid #1d1d20; }
    .log-table td.highlight { color: #e4e4e7; }
    .pill { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10px; }
    .pill-good { background: rgba(34,197,94,0.1); color: #22c55e; }
    .pill-okay { background: rgba(245,158,11,0.1); color: #f59e0b; }
    .pill-bad  { background: rgba(239,68,68,0.1); color: #ef4444; }

    .empty-state { text-align: center; color: #3f3f46; padding: 40px 20px; font-size: 13px; line-height: 1.8; }
    .empty-state .big { font-size: 28px; margin-bottom: 8px; }

    .skeleton { background: #1d1d20; border-radius: 4px; animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    @media (max-width: 520px) {
      body { padding: 20px 14px 40px; }
      .stat-card .value { font-size: 18px; }
      .heatmap-cell { width: 10px; height: 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">M</div>
    <div class="header-title">
      <h1>mavinash-dev</h1>
      <p id="last-synced">Syncing…</p>
    </div>
  </div>
  <button class="analyse-btn" id="analyse-btn" onclick="triggerAnalysis()">
    ✦ Analyse Now
  </button>
</div>
<div class="analyse-toast" id="analyse-toast"></div>

<nav class="tabs" style="max-width:1120px;margin:0 auto 28px">
  <a href="index.html" class="tab">Projects</a>
  <a href="life.html" class="tab active">Life</a>
</nav>

<div id="app">
  <div class="stats-strip">
    <div class="stat-card"><div class="label">Weekly Score</div><div class="skeleton" style="height:22px;width:60%;margin-top:4px"></div></div>
    <div class="stat-card"><div class="label">Days Logged</div><div class="skeleton" style="height:22px;width:40%;margin-top:4px"></div></div>
    <div class="stat-card"><div class="label">Avg Sleep</div><div class="skeleton" style="height:22px;width:50%;margin-top:4px"></div></div>
    <div class="stat-card"><div class="label">Best Streak</div><div class="skeleton" style="height:22px;width:45%;margin-top:4px"></div></div>
  </div>
</div>

<script>
  const PIN_HASH = '01771f461f65f60ba8ed4f22fb83b5cd461195d7bedc69f2027e09e21bd72c65';
  const _t = ['github_pat_11BT5ZT6Q0gy','kcszclHXtz_U8mfhrkUH','fpKgSsnowpdbOs8rpawgfFjMurfkMKRqj5O5CG','LPE5SE0aE3JE'];
  const GH = { Accept: 'application/vnd.github.v3+json', Authorization: `token ${_t.join('')}` };

  async function triggerAnalysis() {
    const pat = localStorage.getItem('vitals_pat');
    const btn   = document.getElementById('analyse-btn');
    const toast = document.getElementById('analyse-toast');

    if (!pat) {
      toast.className = 'analyse-toast show error';
      toast.textContent = 'Open VITALS app first and enter your PAT to enable this.';
      setTimeout(() => toast.className = 'analyse-toast', 3000);
      return;
    }

    btn.classList.add('loading');
    btn.textContent = '⟳ Running…';
    toast.className = 'analyse-toast show running';
    toast.textContent = '⟳ Workflow triggered — Gemini is analysing your data. Refresh in ~60 seconds.';

    try {
      const res = await fetch(
        'https://api.github.com/repos/mavinash-dev/life-log/actions/workflows/analyze.yml/dispatches',
        {
          method: 'POST',
          headers: {
            Authorization: `token ${pat}`,
            Accept: 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ ref: 'main' })
        }
      );

      if (res.status === 204) {
        toast.className = 'analyse-toast show done';
        toast.textContent = '✓ Analysis started. Insights update in ~60s — refresh to see them.';
        btn.textContent = '✓ Started';
        setTimeout(() => {
          btn.classList.remove('loading');
          btn.textContent = '✦ Analyse Now';
          toast.className = 'analyse-toast';
        }, 60000);
      } else {
        throw new Error(`GitHub returned ${res.status}`);
      }
    } catch (e) {
      btn.classList.remove('loading');
      btn.textContent = '✦ Analyse Now';
      toast.className = 'analyse-toast show error';
      toast.textContent = `✗ ${e.message}`;
      setTimeout(() => toast.className = 'analyse-toast', 4000);
    }
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function checkPin() {
    // Already unlocked this session
    if (sessionStorage.getItem('life_unlocked') === 'true') { load(); return; }

    document.getElementById('app').innerHTML = `
      <div style="max-width:320px;margin:80px auto;text-align:center">
        <div style="font-size:28px;margin-bottom:16px">🔒</div>
        <div style="font-size:15px;font-weight:600;color:#fff;margin-bottom:6px">Life Dashboard</div>
        <div style="font-size:12px;color:#52525b;margin-bottom:24px">Enter your PIN to continue</div>
        <input id="pin-input" type="password" inputmode="numeric" maxlength="6"
          placeholder="······"
          style="width:100%;padding:12px 16px;background:#18181b;border:1px solid #27272a;border-radius:10px;color:#fff;font-size:20px;text-align:center;letter-spacing:8px;outline:none;font-family:monospace"
          autofocus />
        <div id="pin-error" style="margin-top:10px;font-size:12px;color:#ef4444;min-height:18px"></div>
      </div>`;

    document.getElementById('pin-input').addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') await verifyPin();
    });
    document.getElementById('pin-input').addEventListener('input', async (e) => {
      if (e.target.value.length === 6) await verifyPin();
    });
  }

  async function verifyPin() {
    const input = document.getElementById('pin-input').value;
    const hash = await sha256(input);
    if (hash === PIN_HASH) {
      sessionStorage.setItem('life_unlocked', 'true');
      load();
    } else {
      const el = document.getElementById('pin-error');
      el.textContent = 'Incorrect PIN';
      document.getElementById('pin-input').value = '';
      document.getElementById('pin-input').focus();
      setTimeout(() => { if (el) el.textContent = ''; }, 2000);
    }
  }

  function decode(b64) {
    const bin = atob(b64.replace(/\n/g,''));
    return new TextDecoder().decode(Uint8Array.from(bin, c => c.charCodeAt(0)));
  }

  function fmtHours(h) {
    if (!h && h !== 0) return '—';
    const hrs = Math.floor(h), mins = Math.round((h - hrs) * 60);
    return mins ? `${hrs}h ${mins}m` : `${hrs}h`;
  }

  async function load() {
    try {
      // Read pre-computed insights.json generated by GitHub Actions + Gemini
      const res = await fetch('https://api.github.com/repos/mavinash-dev/life-log/contents/insights.json', { headers: GH });

      if (!res.ok) {
        if (res.status === 404) throw new Error('no_insights');
        throw new Error(`GitHub API error ${res.status}`);
      }

      const file = await res.json();
      const data = JSON.parse(decode(file.content));

      if (data.empty) throw new Error('no_insights');

      const wkColor = data.weekly_score >= 70 ? '#22c55e' : data.weekly_score >= 40 ? '#f59e0b' : '#ef4444';
      const bestStreak = Math.max(...Object.values(data.streaks || {}));

      document.getElementById('app').innerHTML = `
        <div class="stats-strip">
          <div class="stat-card">
            <div class="label">Weekly Score</div>
            <div class="value" style="color:${wkColor}">${data.weekly_score ?? '—'}%</div>
            <div class="sub">this week</div>
          </div>
          <div class="stat-card">
            <div class="label">Days Logged</div>
            <div class="value">${data.days_analyzed ?? '—'}</div>
            <div class="sub">total entries</div>
          </div>
          <div class="stat-card">
            <div class="label">Avg Sleep</div>
            <div class="value">${fmtHours(data.avg_sleep_hours)}</div>
            <div class="sub">${data.avg_sleep_hours >= 7 ? '✓ on target' : '↓ below 7h'}</div>
          </div>
          <div class="stat-card">
            <div class="label">Best Streak</div>
            <div class="value">${bestStreak > 0 ? bestStreak + '🔥' : '—'}</div>
            <div class="sub">days in a row</div>
          </div>
        </div>

        ${data.summary ? `
        <div class="section">
          <div style="background:#111113;border:1px solid #1d1d20;border-radius:10px;padding:14px 16px;font-size:13px;color:#a1a1aa;line-height:1.5;border-left:3px solid #6366f1">
            ⚡ ${data.summary}
          </div>
        </div>` : ''}

        <div class="section">
          <div class="section-title">Streaks</div>
          <div class="streaks">
            ${[
              { icon: '😴', name: 'Sleep ≥6h',  key: 'sleep',    unit: 'nights' },
              { icon: '💪', name: 'Exercise',    key: 'exercise', unit: 'days'   },
              { icon: '🥗', name: 'Eating well', key: 'eating',   unit: 'days'   },
              { icon: '💧', name: 'Water',       key: 'water',    unit: 'days'   },
            ].map(s => {
              const val = data.streaks?.[s.key] ?? 0;
              return `
                <div class="streak-card">
                  <div class="streak-icon">${s.icon}</div>
                  <div class="streak-info">
                    <div class="streak-name">${s.name}</div>
                    <div class="streak-val">${val > 0 ? val + ' <span class="streak-fire">🔥</span>' : '<span style="color:#3f3f46">0</span>'}</div>
                    <div class="streak-sub">${val > 0 ? val + ' ' + s.unit + ' in a row' : 'Start the streak'}</div>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>

        ${data.heatmap?.length ? `
        <div class="section">
          <div class="section-title">Last 30 Days</div>
          <div style="background:#111113;border:1px solid #1d1d20;border-radius:10px;padding:16px">
            <div style="display:flex;flex-wrap:wrap;gap:3px">
              ${data.heatmap.map(d => {
                const cls = d.quality === 'great' ? 'great' : d.quality === 'good' ? 'good' : d.quality === 'short' ? 'short' : d.quality === 'none' ? 'none' : '';
                const label = new Date(d.date + 'T12:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});
                return `<div class="heatmap-cell ${cls}" title="${label}"></div>`;
              }).join('')}
            </div>
            <div class="heatmap-legend" style="margin-top:10px">
              <span>Sleep:</span>
              <div class="legend-cell" style="background:#16a34a"></div><span>≥7h</span>
              <div class="legend-cell" style="background:#22c55e;opacity:0.7"></div><span>6–7h</span>
              <div class="legend-cell" style="background:#f59e0b;opacity:0.8"></div><span>&lt;6h</span>
              <div class="legend-cell" style="background:#ef4444;opacity:0.7"></div><span>none</span>
              <div class="legend-cell" style="background:#1d1d20"></div><span>not logged</span>
            </div>
          </div>
        </div>` : ''}

        ${data.sleep_bars?.length ? `
        <div class="section">
          <div class="section-title">Sleep — Last 7 Days</div>
          <div style="background:#111113;border:1px solid #1d1d20;border-radius:10px;padding:16px">
            <div class="sleep-bars">
              ${data.sleep_bars.map(d => {
                const pct = Math.min(((d.hours || 0) / 10) * 100, 100);
                const col = d.quality === 'great' ? '#22c55e' : d.quality === 'good' ? '#6366f1' : d.quality === 'short' ? '#f59e0b' : '#ef4444';
                return `
                  <div class="sleep-bar-row">
                    <div class="sleep-bar-label">${d.label}</div>
                    <div class="sleep-bar-track"><div class="sleep-bar-fill" style="width:${pct}%;background:${col}"></div></div>
                    <div class="sleep-bar-val">${d.quality === 'none' ? 'none' : fmtHours(d.hours)}</div>
                  </div>`;
              }).join('')}
            </div>
            <div style="margin-top:10px;font-size:11px;color:#52525b">
              Avg bed time: ${data.avg_bedtime ?? '—'} · Wake: ${data.avg_waketime ?? '—'}
            </div>
          </div>
        </div>` : ''}

        ${data.insights?.length ? `
        <div class="section">
          <div class="section-title">Insights — by Gemini</div>
          <div class="insights">
            ${data.insights.map(i => `
              <div class="insight">
                <div class="insight-icon">${i.icon}</div>
                <div class="insight-text">${i.text}</div>
              </div>`).join('')}
          </div>
        </div>` : ''}

        <div style="max-width:1120px;margin:0 auto;text-align:right;font-size:10px;color:#27272a">
          Analysed ${new Date(data.generated_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})} · Powered by Gemini
        </div>
      `;

      document.getElementById('last-synced').textContent =
        'Synced ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});

    } catch (err) {
      if (err.message === 'no_insights') {
        document.getElementById('app').innerHTML = `
          <div class="empty-state">
            <div class="big">⚡</div>
            <div>No insights yet.</div>
            <div style="margin-top:6px;color:#52525b">Log your first day with <strong style="color:#a1a1aa">VITALS</strong> on iPhone.</div>
            <div style="margin-top:4px;color:#52525b">Gemini analyses your data automatically after each log.</div>
          </div>`;
      } else {
        document.getElementById('app').innerHTML = `
          <div class="empty-state">
            <div class="big">⚠️</div>
            <div style="color:#a1a1aa">${err.message}</div>
            <button onclick="load()" style="margin-top:14px;padding:7px 18px;background:#27272a;border:1px solid #3f3f46;color:#e4e4e7;border-radius:8px;font-size:12px;cursor:pointer">Retry</button>
          </div>`;
      }
      document.getElementById('last-synced').textContent = 'Sync failed';
    }
  }

  checkPin();
</script>
</body>
</html>
