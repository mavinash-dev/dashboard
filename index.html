<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — mavinash-dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 32px 20px 48px;
    }

    /* ── Header ── */
    .header {
      max-width: 1120px;
      margin: 0 auto 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .header-title h1 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
    .header-title p { font-size: 11px; color: #52525b; margin-top: 1px; }
    .stats { display: flex; gap: 4px; }
    .stat {
      padding: 6px 14px; border-radius: 8px;
      background: #18181b; border: 1px solid #27272a;
      text-align: center; min-width: 64px;
    }
    .stat-num { font-size: 16px; font-weight: 600; color: #fff; line-height: 1; }
    .stat-label { font-size: 10px; color: #52525b; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 3px; }

    /* ── Grid ── */
    .grid {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 360px), 1fr));
      gap: 14px;
    }

    /* ── Card ── */
    .card {
      background: #111113;
      border: 1px solid #1d1d20;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
    }
    .card:hover { border-color: #2e2e33; transform: translateY(-1px); }
    .card-accent { height: 3px; width: 100%; flex-shrink: 0; }
    .card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; flex: 1; }

    /* Card header */
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .card-title { flex: 1; min-width: 0; }
    .project-name { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-repo {
      font-size: 11px; color: #3f3f46; font-family: monospace;
      text-decoration: none; display: inline-block; margin-top: 2px;
      transition: color 0.1s;
    }
    .project-repo:hover { color: #71717a; }
    .badge {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 500; white-space: nowrap; flex-shrink: 0;
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* Summary */
    .summary { font-size: 12px; color: #71717a; line-height: 1.55; }

    /* Divider */
    .divider { height: 1px; background: #1d1d20; margin: 0 -18px; }

    /* Meta strip */
    .meta-strip { display: flex; gap: 16px; flex-wrap: wrap; }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px; color: #3f3f46; font-weight: 600; }
    .meta-value { font-size: 12px; color: #a1a1aa; font-variant-numeric: tabular-nums; }

    /* Phase progress */
    .phase-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .phase-label { font-size: 12px; color: #a1a1aa; }
    .phase-dots { display: flex; gap: 4px; }
    .phase-dot { width: 6px; height: 6px; border-radius: 50%; background: #27272a; }
    .phase-dot.filled { background: #6366f1; }

    /* Focus */
    .section-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px; color: #3f3f46; font-weight: 600; margin-bottom: 4px; }
    .focus-text { font-size: 12px; color: #d4d4d8; line-height: 1.5; }

    /* Tasks */
    .tasks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .tasks-count { font-size: 11px; color: #52525b; }
    .progress-bar { height: 3px; background: #27272a; border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; background: #6366f1; transition: width 0.3s ease; }
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .task-list li {
      font-size: 12px; color: #52525b;
      padding-left: 16px; position: relative; line-height: 1.4;
    }
    .task-list li::before {
      content: ''; position: absolute; left: 2px; top: 5px;
      width: 6px; height: 6px; border-radius: 50%;
      border: 1.5px solid #3f3f46;
    }
    .task-list li.more { color: #3f3f46; font-style: italic; padding-left: 0; }
    .task-list li.more::before { display: none; }

    /* Log */
    .log-list { display: flex; flex-direction: column; gap: 8px; }
    .log-entry { display: flex; gap: 10px; }
    .log-line { width: 2px; background: #27272a; border-radius: 2px; flex-shrink: 0; margin-top: 3px; }
    .log-content { flex: 1; min-width: 0; }
    .log-date { font-size: 10px; color: #3f3f46; font-family: monospace; margin-bottom: 3px; }
    .log-done { font-size: 11px; color: #52525b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-done::before { content: '✓ '; color: #22c55e; }

    /* Card footer */
    .card-footer {
      padding: 10px 18px;
      border-top: 1px solid #1d1d20;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-time { font-size: 11px; color: #3f3f46; }
    .gh-btn {
      font-size: 11px; color: #52525b; text-decoration: none;
      display: flex; align-items: center; gap: 4px;
      transition: color 0.1s;
    }
    .gh-btn:hover { color: #a1a1aa; }
    .gh-btn svg { opacity: 0.5; }

    /* Skeletons */
    .skeleton { background: #1d1d20; border-radius: 4px; animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .skeleton-card {
      background: #111113; border: 1px solid #1d1d20;
      border-radius: 12px; padding: 18px; height: 260px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* Footer */
    .page-footer {
      max-width: 1120px; margin: 28px auto 0;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px;
    }
    .page-footer-note { font-size: 11px; color: #2e2e33; }
    .page-footer-link { font-size: 11px; color: #2e2e33; text-decoration: none; transition: color 0.1s; }
    .page-footer-link:hover { color: #52525b; }

    /* Empty */
    .empty { color: #3f3f46; font-size: 13px; padding: 60px 0; text-align: center; }

    /* Pulse / heartbeat for Active */
    .pulse-wrapper { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 5px; height: 5px; flex-shrink: 0; }
    .pulse-ring {
      position: absolute; inset: -3px;
      border-radius: 50%;
      animation: ping 1.8s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping { 0%{transform:scale(1);opacity:0.8} 80%,100%{transform:scale(2.8);opacity:0} }
    .accent-active { animation: accent-pulse 2.5s ease-in-out infinite; }
    @keyframes accent-pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

    /* Text clarity */
    .meta-value { font-size: 12px; color: #c4c4c8; font-variant-numeric: tabular-nums; }
    .task-list li { font-size: 12px; color: #71717a; padding-left: 16px; position: relative; line-height: 1.5; }
    .summary { font-size: 12px; color: #8a8a92; line-height: 1.6; }
    .focus-text { font-size: 13px; color: #e4e4e7; line-height: 1.5; }
    .log-done { font-size: 11px; color: #6b6b73; }

    /* Responsive */
    @media (max-width: 520px) {
      body { padding: 20px 14px 40px; }
      .header { margin-bottom: 24px; }
      .header-title h1 { font-size: 15px; }
      .stat { padding: 5px 10px; min-width: 52px; }
      .stat-num { font-size: 14px; }
      .card-body { padding: 14px 15px; gap: 12px; }
      .card-footer { padding: 9px 15px; }
      .divider { margin: 0 -15px; }
      .grid { gap: 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">M</div>
    <div class="header-title">
      <h1>mavinash-dev</h1>
      <p id="last-updated">Syncing with GitHub…</p>
    </div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-active" style="color:#22c55e">—</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-hold" style="color:#f59e0b">—</div>
      <div class="stat-label">Hold</div>
    </div>
  </div>
</div>

<div id="grid" class="grid">
  <div class="skeleton-card">
    <div class="skeleton" style="height:3px;border-radius:0;margin:-18px -18px 0"></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="skeleton" style="height:14px;width:45%"></div>
      <div class="skeleton" style="height:20px;width:60px;border-radius:20px"></div>
    </div>
    <div class="skeleton" style="height:10px;width:90%"></div>
    <div class="skeleton" style="height:10px;width:75%"></div>
    <div class="skeleton" style="height:1px;width:100%"></div>
    <div class="skeleton" style="height:10px;width:60%"></div>
    <div class="skeleton" style="height:10px;width:80%"></div>
  </div>
  <div class="skeleton-card">
    <div class="skeleton" style="height:3px;border-radius:0;margin:-18px -18px 0"></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="skeleton" style="height:14px;width:50%"></div>
      <div class="skeleton" style="height:20px;width:60px;border-radius:20px"></div>
    </div>
    <div class="skeleton" style="height:10px;width:85%"></div>
    <div class="skeleton" style="height:10px;width:70%"></div>
    <div class="skeleton" style="height:1px;width:100%"></div>
    <div class="skeleton" style="height:10px;width:55%"></div>
    <div class="skeleton" style="height:10px;width:78%"></div>
  </div>
</div>

<div class="page-footer">
  <span class="page-footer-note">Reads from GitHub API · Refresh to sync</span>
  <a class="page-footer-link" href="https://github.com/mavinash-dev" target="_blank">github.com/mavinash-dev ↗</a>
</div>

<script>
  const OWNER = 'mavinash-dev';

  // Fix: atob() returns binary string — must decode as UTF-8 or em-dashes/arrows break
  function decodeBase64(base64) {
    const binary = atob(base64.replace(/\n/g, ''));
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    return new TextDecoder('utf-8').decode(bytes);
  }

  const STATUS_COLORS = {
    Active:   { text: '#22c55e', bg: 'rgba(34,197,94,0.08)',  border: 'rgba(34,197,94,0.15)', accent: '#22c55e' },
    Hold:     { text: '#f59e0b', bg: 'rgba(245,158,11,0.08)', border: 'rgba(245,158,11,0.15)', accent: '#f59e0b' },
    Complete: { text: '#6366f1', bg: 'rgba(99,102,241,0.08)', border: 'rgba(99,102,241,0.15)', accent: '#6366f1' },
    Archived: { text: '#52525b', bg: 'rgba(82,82,91,0.08)',   border: 'rgba(82,82,91,0.15)',   accent: '#3f3f46' },
  };

  function parseMeta(text) {
    const meta = { name:'', status:'Unknown', phase:'—', started:'—', last_updated:'—', summary:'—', current_focus:'—' };
    const match = text.match(/<!--\s*DASHBOARD_META([\s\S]*?)-->/);
    if (!match) return meta;
    for (const line of match[1].split('\n').map(l => l.trim()).filter(Boolean)) {
      const idx = line.indexOf(':');
      if (idx > -1) meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
    }
    return meta;
  }

  function parseTasks(text) {
    // Only count pending tasks — done count comes from time tracker rows
    const pending = [];
    let inPending = false;
    for (const line of text.split('\n')) {
      if (/^## Pending Tasks/.test(line)) { inPending = true; continue; }
      if (inPending && /^## /.test(line)) break;
      if (inPending && /^- \[ \]/.test(line)) pending.push(line.replace('- [ ]', '').trim());
    }
    // Count done tasks from time tracker (number of sessions = sessions completed)
    const sessionMatches = text.match(/^### .+/gm) || [];
    const done = Math.max(0, sessionMatches.length - 1); // sessions minus the initial one
    return { pending, done };
  }

  function parseLog(text) {
    const entries = [];
    const seen = new Set();
    let inSection = false, cur = null;
    for (const line of text.split('\n')) {
      if (/^## Development Log/.test(line)) { inSection = true; continue; }
      if (inSection && /^## /.test(line)) { if (cur && !seen.has(cur.date)) { seen.add(cur.date); entries.push(cur); } break; }
      if (inSection && /^### /.test(line)) {
        if (cur && !seen.has(cur.date)) { seen.add(cur.date); entries.push(cur); }
        cur = { date: line.replace('###', '').trim(), done: [], time: '' };
      } else if (inSection && cur && /^- \[x\]/i.test(line)) {
        cur.done.push(line.replace(/^- \[x\]/i, '').trim());
      } else if (inSection && cur && /\*\*Time:\*\*/.test(line)) {
        cur.time = line.replace('**Time:**', '').replace(/^[-—]$/, '').trim();
      }
    }
    if (cur && !seen.has(cur.date)) entries.push(cur);
    return entries.slice(0, 2);
  }

  function parseTime(text) {
    const rows = [];
    let inTable = false;
    for (const line of text.split('\n')) {
      if (line.includes('Cumulative')) { inTable = true; continue; }
      if (inTable && line.startsWith('|') && !line.includes('---')) {
        const cols = line.split('|').map(c => c.trim()).filter(Boolean);
        if (cols.length >= 4 && cols[3] !== 'Cumulative') rows.push(cols[3]);
      }
      if (inTable && !line.startsWith('|') && line.trim()) break;
    }
    return rows.length ? rows[rows.length - 1] : '—';
  }

  function phaseNumber(phaseStr) {
    const m = phaseStr.match(/\d+/);
    return m ? parseInt(m[0]) : 1;
  }

  function relativeDate(dateStr) {
    if (!dateStr || dateStr === '—') return dateStr;
    // Parse as local date (avoid UTC timezone shifting date by -1)
    const parts = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!parts) return dateStr;
    const d = new Date(+parts[1], +parts[2] - 1, +parts[3]);
    if (isNaN(d)) return dateStr;
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const diff = Math.floor((today - d) / 86400000);
    if (diff <= 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 7) return `${diff}d ago`;
    if (diff < 30) return `${Math.floor(diff / 7)}w ago`;
    return `${Math.floor(diff / 30)}mo ago`;
  }

  function renderCard(meta, tasks, log, totalTime, repo) {
    const col = STATUS_COLORS[meta.status] || STATUS_COLORS.Archived;
    const { pending, done } = tasks;
    const totalTasks = pending.length;
    const completedPct = 0; // pending tasks are what's left — bar shows remaining work
    const phaseNum = phaseNumber(meta.phase);
    const totalPhases = 3;

    const phaseDots = Array.from({ length: totalPhases }, (_, i) =>
      `<div class="phase-dot ${i < phaseNum ? 'filled' : ''}"></div>`
    ).join('');

    const taskItems = pending.slice(0, 3).map(t =>
      `<li>${t.replace(/\s*—\s*est:.*$/, '').replace(/\s*\(est:.*?\)/, '')}</li>`
    ).join('') + (pending.length > 3 ? `<li class="more">+${pending.length - 3} more pending</li>` : '');

    const logItems = log.slice(0, 2).map(e =>
      `<div class="log-entry">
        <div class="log-line"></div>
        <div class="log-content">
          <div class="log-date">${e.date}${e.time ? '  ·  ' + e.time : ''}</div>
          ${e.done.slice(0, 2).map(d => `<div class="log-done">${d}</div>`).join('')}
        </div>
      </div>`
    ).join('');

    return `
      <div class="card">
        <div class="card-accent${meta.status === 'Active' ? ' accent-active' : ''}" style="background:${col.accent}"></div>
        <div class="card-body">

          <div class="card-header">
            <div class="card-title">
              <div class="project-name">${meta.name || repo}</div>
              <a class="project-repo" href="https://github.com/${OWNER}/${repo}" target="_blank">${OWNER}/${repo}</a>
            </div>
            <span class="badge" style="background:${col.bg};color:${col.text};border:1px solid ${col.border}">
              ${meta.status === 'Active'
                ? `<span class="pulse-wrapper"><span class="pulse-ring" style="background:${col.text}"></span><span class="dot" style="background:${col.text}"></span></span>`
                : `<span class="dot" style="background:${col.text}"></span>`
              }${meta.status}
            </span>
          </div>

          <div class="summary">${meta.summary}</div>

          <div class="divider"></div>

          <div class="meta-strip">
            <div class="meta-item">
              <span class="meta-label">Started</span>
              <span class="meta-value">${relativeDate(meta.started)}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Updated</span>
              <span class="meta-value">${relativeDate(meta.last_updated)}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Time</span>
              <span class="meta-value">${totalTime}</span>
            </div>
          </div>

          <div class="phase-row">
            <span class="phase-label">${meta.phase}</span>
            <div class="phase-dots">${phaseDots}</div>
          </div>

          <div class="divider"></div>

          <div>
            <div class="section-label">Current Focus</div>
            <div class="focus-text">${meta.current_focus}</div>
          </div>

          ${pending.length ? `
          <div class="divider"></div>
          <div>
            <div class="tasks-header">
              <div class="section-label">Pending Tasks</div>
              <span class="tasks-count">${pending.length} remaining</span>
            </div>
            <ul class="task-list">${taskItems}</ul>
          </div>` : ''}

          ${log.length ? `
          <div class="divider"></div>
          <div>
            <div class="section-label" style="margin-bottom:8px">Recent Activity</div>
            <div class="log-list">${logItems}</div>
          </div>` : ''}

        </div>

        <div class="card-footer">
          <span class="footer-time">${totalTime !== '—' ? totalTime + ' logged' : 'No time logged yet'}</span>
          <a class="gh-btn" href="https://github.com/${OWNER}/${repo}" target="_blank">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            View on GitHub
          </a>
        </div>
      </div>`;
  }

  async function fetchAllRepos(owner) {
    const res = await fetch(
      `https://api.github.com/users/${owner}/repos?per_page=100&sort=updated`,
      { headers: { Accept: 'application/vnd.github.v3+json' } }
    );
    if (!res.ok) throw new Error('Could not fetch repos');
    const repos = await res.json();
    return repos.map(r => r.name);
  }

  async function fetchStatus(owner, repo) {
    try {
      const res = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/contents/STATUS.md`,
        { headers: { Accept: 'application/vnd.github.v3+json' } }
      );
      if (!res.ok) return null;
      const json = await res.json();
      return decodeBase64(json.content);
    } catch { return null; }
  }

  async function load() {
    try {
      const repoNames = await fetchAllRepos(OWNER);
      const settled = await Promise.allSettled(repoNames.map(r => fetchStatus(OWNER, r)));
      const cards = [];
      let active = 0, hold = 0;

      settled.forEach((result, i) => {
        if (result.status !== 'fulfilled' || !result.value) return;
        const text = result.value;
        const meta = parseMeta(text);
        if (!meta.name && !meta.summary) return;
        const tasks = parseTasks(text);
        const log = parseLog(text);
        const time = parseTime(text);
        if (meta.status === 'Active') active++;
        if (meta.status === 'Hold') hold++;
        cards.push(renderCard(meta, tasks, log, time, repoNames[i]));
      });

      document.getElementById('grid').innerHTML = cards.length
        ? cards.join('')
        : `<div class="empty">No projects found.<br>Push a STATUS.md with a DASHBOARD_META block to any repo.</div>`;

      document.getElementById('stat-total').textContent = cards.length;
      document.getElementById('stat-active').textContent = active;
      document.getElementById('stat-hold').textContent = hold;
      document.getElementById('last-updated').textContent =
        'Synced ' + new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    } catch (err) {
      document.getElementById('grid').innerHTML =
        `<div class="empty">Failed to load: ${err.message}</div>`;
      document.getElementById('last-updated').textContent = 'Sync failed';
    }
  }

  load();
</script>
</body>
</html>
