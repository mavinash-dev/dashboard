<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — mavinash-dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 28px 20px;
    }
    .header {
      max-width: 1100px;
      margin: 0 auto 28px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-left h1 { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
    .header-left p { font-size: 12px; color: #71717a; margin-top: 3px; }
    .stats { display: flex; gap: 20px; }
    .stat { text-align: right; }
    .stat-num { font-size: 20px; font-weight: 600; color: #fff; }
    .stat-label { font-size: 10px; color: #52525b; text-transform: uppercase; letter-spacing: 0.5px; }
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
      gap: 14px;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #3f3f46; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .project-name { font-size: 15px; font-weight: 600; color: #fff; }
    .project-repo { font-size: 11px; color: #52525b; margin-top: 2px; font-family: monospace; }
    .badge {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 500; white-space: nowrap; flex-shrink: 0;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .summary { font-size: 13px; color: #a1a1aa; line-height: 1.5; }
    .meta-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .meta-item { font-size: 11px; color: #52525b; }
    .phase-tag { background: #27272a; color: #a1a1aa; padding: 1px 7px; border-radius: 4px; font-size: 11px; }
    .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: #3f3f46; font-weight: 600; }
    .focus-text { font-size: 13px; color: #d4d4d8; line-height: 1.4; }
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .task-list li {
      font-size: 12px; color: #71717a;
      padding-left: 14px; position: relative; line-height: 1.4;
    }
    .task-list li::before { content: '○'; position: absolute; left: 0; color: #3f3f46; font-size: 10px; top: 1px; }
    .task-list li.more { color: #3f3f46; font-style: italic; }
    .log-list { display: flex; flex-direction: column; gap: 8px; }
    .log-entry { border-left: 2px solid #27272a; padding-left: 10px; }
    .log-date { font-size: 11px; color: #3f3f46; margin-bottom: 3px; font-family: monospace; }
    .log-done { font-size: 12px; color: #52525b; }
    .skeleton { background: #27272a; border-radius: 6px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .skeleton-card {
      background: #18181b; border: 1px solid #27272a;
      border-radius: 12px; padding: 18px; height: 220px;
    }
    .error-msg { color: #f87171; font-size: 12px; font-family: monospace; }
    .gh-link {
      font-size: 11px; color: #3f3f46; text-decoration: none;
      margin-top: 4px; display: inline-block;
    }
    .gh-link:hover { color: #71717a; }
    .footer {
      max-width: 1100px; margin: 20px auto 0;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px;
    }
    .footer-note { font-size: 11px; color: #3f3f46; }
    .footer-link { font-size: 11px; color: #3f3f46; text-decoration: none; }
    .footer-link:hover { color: #52525b; }

    @media (max-width: 480px) {
      body { padding: 20px 14px; }
      .header { margin-bottom: 20px; }
      .header-left h1 { font-size: 18px; }
      .stat-num { font-size: 18px; }
      .stats { gap: 14px; }
      .card { padding: 14px; gap: 10px; }
      .project-name { font-size: 14px; }
      .summary { font-size: 12px; }
      .grid { gap: 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Projects</h1>
    <p id="last-updated">Loading...</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-active" style="color:#22c55e">—</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-hold" style="color:#f59e0b">—</div>
      <div class="stat-label">On Hold</div>
    </div>
  </div>
</div>

<div id="grid" class="grid">
  <div class="skeleton-card"><div class="skeleton" style="height:14px;width:60%;margin-bottom:12px"></div><div class="skeleton" style="height:10px;width:90%"></div></div>
  <div class="skeleton-card"><div class="skeleton" style="height:14px;width:50%;margin-bottom:12px"></div><div class="skeleton" style="height:10px;width:80%"></div></div>
</div>

<div class="footer">
  <span class="footer-note">Reads from GitHub · Refresh to update</span>
  <a class="footer-link" href="https://github.com/mavinash-dev" target="_blank">github.com/mavinash-dev</a>
</div>

<script>
  const OWNER = 'mavinash-dev'; // ← only thing to change if username ever changes

  const STATUS_COLORS = {
    Active:   { text: '#22c55e', bg: 'rgba(34,197,94,0.1)',  border: 'rgba(34,197,94,0.2)' },
    Hold:     { text: '#f59e0b', bg: 'rgba(245,158,11,0.1)', border: 'rgba(245,158,11,0.2)' },
    Complete: { text: '#6366f1', bg: 'rgba(99,102,241,0.1)', border: 'rgba(99,102,241,0.2)' },
    Archived: { text: '#6b7280', bg: 'rgba(107,114,128,0.1)',border: 'rgba(107,114,128,0.2)' },
  };

  function parseMeta(text) {
    const meta = { name:'', status:'Unknown', phase:'—', started:'—', last_updated:'—', summary:'—', current_focus:'—' };
    const match = text.match(/<!--\s*DASHBOARD_META([\s\S]*?)-->/);
    if (!match) return meta;
    for (const line of match[1].split('\n').map(l => l.trim()).filter(Boolean)) {
      const idx = line.indexOf(':');
      if (idx > -1) meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
    }
    return meta;
  }

  function parseTasks(text) {
    const tasks = [];
    let inSection = false;
    for (const line of text.split('\n')) {
      if (/^## Pending Tasks/.test(line)) { inSection = true; continue; }
      if (inSection && /^## /.test(line)) break;
      if (inSection && /^- \[ \]/.test(line)) tasks.push(line.replace('- [ ]', '').trim());
    }
    return tasks;
  }

  function parseLog(text) {
    const entries = [];
    let inSection = false, cur = null;
    for (const line of text.split('\n')) {
      if (/^## Development Log/.test(line)) { inSection = true; continue; }
      if (inSection && /^## /.test(line)) { if (cur) entries.push(cur); break; }
      if (inSection && /^### /.test(line)) {
        if (cur) entries.push(cur);
        cur = { date: line.replace('###', '').trim(), done: [], time: '' };
      } else if (inSection && cur && /^- \[x\]/i.test(line)) {
        cur.done.push(line.replace(/^- \[x\]/i, '').trim());
      } else if (inSection && cur && /\*\*Time:\*\*/.test(line)) {
        cur.time = line.replace('**Time:**', '').trim();
      }
    }
    if (cur) entries.push(cur);
    return entries.slice(0, 2);
  }

  function parseTime(text) {
    const rows = [];
    let inTable = false;
    for (const line of text.split('\n')) {
      if (line.includes('Cumulative')) { inTable = true; continue; }
      if (inTable && line.startsWith('|') && !line.includes('---')) {
        const cols = line.split('|').map(c => c.trim()).filter(Boolean);
        if (cols.length >= 4 && cols[3] !== 'Cumulative') rows.push(cols[3]);
      }
      if (inTable && !line.startsWith('|') && line.trim()) break;
    }
    return rows.length ? rows[rows.length - 1] : '—';
  }

  function renderCard(meta, tasks, log, totalTime, repo) {
    const col = STATUS_COLORS[meta.status] || STATUS_COLORS.Archived;
    const taskItems = tasks.slice(0, 4).map(t =>
      `<li>${t.replace(/\s*—\s*est:.*$/, '')}</li>`
    ).join('') + (tasks.length > 4 ? `<li class="more">+${tasks.length - 4} more</li>` : '');

    const logItems = log.slice(0, 2).map(e =>
      `<div class="log-entry">
        <div class="log-date">${e.date}${e.time ? ' · ' + e.time : ''}</div>
        ${e.done.slice(0, 2).map(d => `<div class="log-done">✓ ${d}</div>`).join('')}
      </div>`
    ).join('');

    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="project-name">${meta.name || repo}</div>
            <a class="project-repo gh-link" href="https://github.com/${PROJECTS.find(p=>p.repo===repo)?.owner}/${repo}" target="_blank">${repo}</a>
          </div>
          <span class="badge" style="background:${col.bg};color:${col.text};border:1px solid ${col.border}">
            <span class="dot" style="background:${col.text}"></span>${meta.status}
          </span>
        </div>

        <div class="summary">${meta.summary}</div>

        <div class="meta-row">
          <span class="meta-item">📅 ${meta.started}</span>
          <span class="meta-item">🔄 ${meta.last_updated}</span>
          <span class="meta-item">⏱ ${totalTime}</span>
          <span class="phase-tag">${meta.phase}</span>
        </div>

        <div class="section-label">Current Focus</div>
        <div class="focus-text">${meta.current_focus}</div>

        ${tasks.length ? `
          <div class="section-label">Pending (${tasks.length})</div>
          <ul class="task-list">${taskItems}</ul>
        ` : ''}

        ${log.length ? `
          <div class="section-label">Recent</div>
          <div class="log-list">${logItems}</div>
        ` : ''}
      </div>`;
  }

  async function fetchAllRepos(owner) {
    const res = await fetch(
      `https://api.github.com/users/${owner}/repos?per_page=100&sort=updated`,
      { headers: { Accept: 'application/vnd.github.v3+json' } }
    );
    if (!res.ok) throw new Error('Could not fetch repos');
    const repos = await res.json();
    return repos.map(r => r.name);
  }

  async function fetchStatus(owner, repo) {
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/STATUS.md`;
    const res = await fetch(url, { headers: { Accept: 'application/vnd.github.v3+json' } });
    if (!res.ok) return null; // no STATUS.md — skip silently
    const json = await res.json();
    return atob(json.content.replace(/\n/g, ''));
  }

  async function load() {
    const repoNames = await fetchAllRepos(OWNER);
    const settled = await Promise.allSettled(repoNames.map(r => fetchStatus(OWNER, r)));

    const cards = [];
    let active = 0, hold = 0;

    settled.forEach((result, i) => {
      if (result.status !== 'fulfilled' || !result.value) return; // no STATUS.md, skip
      const text = result.value;
      const meta = parseMeta(text);
      if (!meta.name && !meta.summary) return; // no valid DASHBOARD_META block, skip
      const tasks = parseTasks(text);
      const log = parseLog(text);
      const time = parseTime(text);
      if (meta.status === 'Active') active++;
      if (meta.status === 'Hold') hold++;
      cards.push(renderCard(meta, tasks, log, time, repoNames[i]));
    });

    document.getElementById('grid').innerHTML = cards.length
      ? cards.join('')
      : `<div style="color:#3f3f46;font-size:13px;padding:40px 0">No projects found. Push a STATUS.md with a DASHBOARD_META block to any repo.</div>`;
    document.getElementById('stat-total').textContent = cards.length;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-hold').textContent = hold;
    document.getElementById('last-updated').textContent =
      new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  load();
</script>
</body>
</html>
